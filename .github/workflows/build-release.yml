name: Build Windows Release

# Code Signing (opcional — elimina alerta do Windows SmartScreen):
# Configure os seguintes secrets no repositório GitHub (Settings → Secrets → Actions):
#   CODE_SIGN_CERTIFICATE : certificado PFX em base64
#                           (cat cert.pfx | base64 -w 0)
#   CODE_SIGN_PASSWORD    : senha do arquivo PFX
# Certificados EV: DigiCert, Sectigo, GlobalSign (~$200/ano).
# Se os secrets não estiverem configurados, a etapa de assinatura é ignorada.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pillow

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version.py
        shell: python
        run: |
          import re
          version = "${{ steps.version.outputs.VERSION }}"
          path = "src/version.py"
          content = open(path).read()
          content = re.sub(r'__version__ = "[^"]*"', f'__version__ = "{version}"', content)
          open(path, "w").write(content)

      - name: Generate valid ICO
        shell: python
        run: |
          from PIL import Image, ImageDraw
          img = Image.new("RGBA", (256, 256), (33, 150, 243, 255))
          draw = ImageDraw.Draw(img)
          draw.ellipse([48, 48, 208, 208], fill=(255, 255, 255, 220))
          draw.text((100, 95), "SR", fill=(33, 150, 243, 255))
          img.save("resources/icons/simplerename.ico", format="ICO",
                   sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])

      - name: Build executable with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile --windowed \
            --icon=resources/icons/simplerename.ico \
            --name=SimpleRename \
            --add-data="resources;resources" \
            main.py

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build NSIS Installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DVERSION=${{ steps.version.outputs.VERSION }} installer.nsi

      - name: Sign executables (requer CODE_SIGN_CERTIFICATE secret)
        shell: pwsh
        env:
          CODE_SIGN_CERTIFICATE: ${{ secrets.CODE_SIGN_CERTIFICATE }}
          CODE_SIGN_PASSWORD: ${{ secrets.CODE_SIGN_PASSWORD }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if (-not $env:CODE_SIGN_CERTIFICATE) {
            Write-Host "CODE_SIGN_CERTIFICATE nao configurado — assinatura ignorada"
            exit 0
          }
          try {
            $bytes = [Convert]::FromBase64String($env:CODE_SIGN_CERTIFICATE)
            [IO.File]::WriteAllBytes('certificate.pfx', $bytes)
            $signtool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' `
              -Recurse -Filter 'signtool.exe' |
              Sort-Object FullName | Select-Object -Last 1 -ExpandProperty FullName
            $targets = @(
              "dist\SimpleRename.exe",
              "SimpleRename-Setup-$env:VERSION.exe"
            )
            & $signtool sign /f certificate.pfx /p $env:CODE_SIGN_PASSWORD `
              /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
              @targets
            if ($LASTEXITCODE -ne 0) { throw "signtool falhou com codigo $LASTEXITCODE" }
            Write-Host "Assinatura concluida com sucesso"
          } finally {
            Remove-Item -Force certificate.pfx -ErrorAction SilentlyContinue
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          name: "Simple Rename v${{ steps.version.outputs.VERSION }}"
          files: |
            dist/SimpleRename.exe
            SimpleRename-Setup-${{ steps.version.outputs.VERSION }}.exe
