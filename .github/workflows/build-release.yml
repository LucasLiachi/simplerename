name: Build Windows Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pillow

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version.py
        shell: python
        run: |
          import re
          version = "${{ steps.version.outputs.VERSION }}"
          path = "src/version.py"
          content = open(path).read()
          content = re.sub(r'__version__ = "[^"]*"', f'__version__ = "{version}"', content)
          open(path, "w").write(content)

      - name: Generate valid ICO
        shell: python
        run: |
          from PIL import Image, ImageDraw
          img = Image.new("RGBA", (256, 256), (33, 150, 243, 255))
          draw = ImageDraw.Draw(img)
          draw.ellipse([48, 48, 208, 208], fill=(255, 255, 255, 220))
          draw.text((100, 95), "SR", fill=(33, 150, 243, 255))
          img.save("resources/icons/simplerename.ico", format="ICO",
                   sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])

      - name: Build executable with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile --windowed \
            --icon=resources/icons/simplerename.ico \
            --name=SimpleRename \
            --add-data="resources;resources" \
            main.py

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build NSIS Installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DVERSION=${{ steps.version.outputs.VERSION }} installer.nsi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          name: "Simple Rename v${{ steps.version.outputs.VERSION }}"
          files: |
            dist/SimpleRename.exe
            SimpleRename-Setup-${{ steps.version.outputs.VERSION }}.exe
